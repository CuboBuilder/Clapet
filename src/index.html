<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pet</title>
  </head>
  <body>
    <div id="pet-container" class="state-idle">
      <div id="thought-bubble" class="hidden">
        <span id="thought-text"></span>
      </div>

      <svg id="pet-svg" viewBox="0 0 220 240" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
          </filter>
        </defs>

        <!-- Body - long rectangle -->
        <g id="body" class="body-part">
          <rect x="45" y="100" width="130" height="90" rx="0" fill="#df7959" filter="url(#shadow)"/>
          <rect x="55" y="110" width="110" height="60" rx="0" fill="#df7959" opacity="0.2"/>
        </g>

        <!-- Eyes on body -->
        <g id="head" class="head-part">
          <g class="eye-group">
            <g id="eye-left">
              <rect id="eye-rect-left" x="73" y="135" width="30" height="20" rx="0" fill="#1A1A1A"/>
            </g>
            <g id="eye-right">
              <rect id="eye-rect-right" x="119" y="135" width="30" height="20" rx="0" fill="#1A1A1A"/>
            </g>
          </g>

          <!-- Sleep eyes (narrow slits) -->
          <g id="sleep-eyes" class="hidden">
            <rect x="76" y="143" width="24" height="3" rx="0" fill="#1A1A1A" transform="rotate(-3, 88, 144.5)"/>
            <rect x="122" y="143" width="24" height="3" rx="0" fill="#1A1A1A" transform="rotate(3, 134, 144.5)"/>
          </g>

          <!-- Mouth (shown on feed/happy) -->
          <g id="mouth" style="opacity:0">
            <path d="M 100 164 Q 110 172, 120 164" stroke="#1A1A1A" stroke-width="2.5" fill="none" stroke-linecap="square"/>
          </g>

          <!-- Grab eyes (> < when dragging) -->
          <g id="grab-eyes" style="opacity:0">
            <polyline points="78,137 98,145 78,153" stroke="#1A1A1A" stroke-width="5" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>
            <polyline points="144,137 124,145 144,153" stroke="#1A1A1A" stroke-width="5" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>
          </g>

          <!-- Happy eyes (^ ^) -->
          <g id="happy-eyes" style="opacity:0">
            <polyline points="82,147 88,139 94,147" stroke="#1A1A1A" stroke-width="4" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>
            <polyline points="128,147 134,139 140,147" stroke="#1A1A1A" stroke-width="4" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>
          </g>
        </g>

        <!-- Think eyes (static, outside head so not affected by tilt) -->
        <g id="think-eyes" style="opacity:0">
          <circle cx="88" cy="137" r="5" fill="#1A1A1A"/>
          <circle cx="134" cy="137" r="5" fill="#1A1A1A"/>
        </g>

        <!-- Glasses for think state -->
        <g id="glasses" style="opacity:0">
          <circle cx="88" cy="139" r="13" stroke="#333" stroke-width="2.5" fill="none"/>
          <circle cx="134" cy="139" r="13" stroke="#333" stroke-width="2.5" fill="none"/>
          <path d="M 101 139 Q 111 136, 121 139" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="square"/>
          <line x1="75" y1="135" x2="66" y2="128" stroke="#333" stroke-width="2.5" stroke-linecap="square"/>
          <line x1="147" y1="135" x2="156" y2="128" stroke="#333" stroke-width="2.5" stroke-linecap="square"/>
        </g>

        <!-- 4 legs (rendered last so they appear on top when sleeping) -->
        <g id="legs" class="legs-part">
          <rect id="leg-fl" x="58" y="185" width="14" height="22" rx="0" fill="#df7959"/>
          <rect id="leg-bl" x="80" y="185" width="14" height="22" rx="0" fill="#df7959"/>
          <rect id="leg-fr" x="128" y="185" width="14" height="22" rx="0" fill="#df7959"/>
          <rect id="leg-br" x="150" y="185" width="14" height="22" rx="0" fill="#df7959"/>
        </g>

        <!-- Paws (rendered last so they appear on top when sleeping) -->
        <g id="left-paw" class="paw left-paw">
          <rect x="25" y="132" width="20" height="20" rx="0" fill="#df7959"/>
        </g>
        <g id="right-paw" class="paw right-paw">
          <rect x="175" y="132" width="20" height="20" rx="0" fill="#df7959"/>
        </g>
      </svg>

      <div id="radial-menu" class="hidden">
        <button class="radial-btn" data-action="think" aria-label="Think">
          <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="8" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M8 7.5a2 2 0 0 1 4 0c0 1.5-2 2-2 3" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="10" cy="14" r=".8" fill="currentColor"/></svg>
        </button>
        <button class="radial-btn" data-action="happy" aria-label="Happy">
          <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="8" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="7" cy="8.5" r="1" fill="currentColor"/><circle cx="13" cy="8.5" r="1" fill="currentColor"/><path d="M6.5 12a3.5 3.5 0 0 0 7 0" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <button class="radial-btn" data-action="sleep" aria-label="Sleep">
          <svg viewBox="0 0 20 20"><path d="M15.4932 13.4967C13.5653 16.8358 9.2957 17.9798 5.95663 16.052C5.20013 15.6152 4.54451 15.0515 4.01047 14.3887C6.8412 13.3015 8.56844 11.9681 9.60339 9.99249C10.651 7.99273 10.9395 5.83183 10.3628 3.08319C11.2605 3.20148 12.1328 3.49537 12.9378 3.96018C16.2769 5.88799 17.421 10.1576 15.4932 13.4967ZM5.45663 16.918C9.27399 19.122 14.1552 17.8141 16.3592 13.9967C18.5631 10.1793 17.2552 5.2981 13.4378 3.09415C12.3371 2.45863 11.1233 2.10173 9.88082 2.03507C9.4801 2.01357 9.17217 2.38477 9.26732 2.77462C9.95545 5.59395 9.70125 7.65076 8.71759 9.52844C7.78322 11.312 6.17301 12.559 3.16661 13.635C2.79667 13.7674 2.65251 14.2143 2.87537 14.538C3.54192 15.5059 4.41706 16.3178 5.45663 16.918Z" fill="currentColor"/></svg>
        </button>
        <button class="radial-btn" data-action="feed" aria-label="Feed">
          <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="7.5" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="7.5" cy="8" r="1.5" fill="currentColor"/><circle cx="12.5" cy="9.5" r="1.2" fill="currentColor"/><circle cx="9" cy="13.5" r="1" fill="currentColor"/></svg>
        </button>
        <button class="radial-btn" data-action="settings" aria-label="Settings">
          <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="3.5" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="10" cy="3" r="1.3" fill="currentColor"/><circle cx="10" cy="17" r="1.3" fill="currentColor"/><circle cx="3" cy="10" r="1.3" fill="currentColor"/><circle cx="17" cy="10" r="1.3" fill="currentColor"/></svg>
        </button>
        <button class="radial-btn ask-item hidden" data-action="ask" aria-label="Ask">
          <svg viewBox="0 0 20 20"><path d="M2 3h16v12H8l-6 5V3z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M8.5 8a2 2 0 0 1 3 0c0 1.5-1.5 2-1.5 3" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="10" cy="13" r=".7" fill="currentColor"/></svg>
        </button>
        <button class="radial-btn" data-action="walk-toggle" id="walk-btn" aria-label="Auto Walk">
          <svg viewBox="0 0 20 20"><path d="M11.5 2.99805C10.6716 2.99805 10 3.66962 10 4.49805C10 5.32647 10.6716 5.99805 11.5 5.99805C12.3284 5.99805 13 5.32647 13 4.49805C13 3.66962 12.3284 2.99805 11.5 2.99805ZM9 4.49805C9 3.11734 10.1193 1.99805 11.5 1.99805C12.8807 1.99805 14 3.11734 14 4.49805C14 5.29825 13.624 6.01064 13.0391 6.46823C13.5266 6.67494 13.9514 7.0211 14.2538 7.47463L14.779 8.26252L16.268 9.3261C17.0545 9.88787 17.2367 10.9808 16.6749 11.7673C16.1131 12.5538 15.0202 12.7359 14.2337 12.1742L12.4837 10.9241C12.4529 10.9022 12.4229 10.8793 12.3937 10.8554L12.3793 10.8986L13.322 12.3253C13.5725 12.7045 13.7251 13.1398 13.7663 13.5923L13.9935 16.0916C14.081 17.0541 13.3716 17.9054 12.4091 17.9929C11.4466 18.0804 10.5953 17.371 10.5078 16.4085L10.2977 14.0972L9.80411 13.3501L8.37436 16.9034C8.01357 17.8 6.99423 18.2344 6.0976 17.8736C5.20096 17.5128 4.76657 16.4935 5.12736 15.5969L6.47445 12.249C6.23443 12.2592 5.98842 12.22 5.75089 12.1249C4.85353 11.766 4.41707 10.7475 4.77603 9.85015L5.87603 7.10029C6.08472 6.5786 6.53121 6.18884 7.07631 6.05253L8.61602 5.6675C8.82492 5.61526 9.03706 5.58822 9.24829 5.58555C9.0892 5.25675 9 4.88781 9 4.49805ZM9.31751 6.52264L7.31751 7.02265C7.08394 7.08105 6.89261 7.24802 6.80313 7.47153L5.70235 10.2214C5.54842 10.6059 5.73536 11.0425 6.11991 11.1964C6.50446 11.3503 6.94099 11.1634 7.09492 10.7788L7.96053 8.61647C8.01875 8.47103 8.14325 8.36238 8.29524 8.32438C8.68191 8.22771 9.01513 8.61025 8.86635 8.98001L6.05363 15.9703C5.89901 16.3545 6.08518 16.7914 6.46945 16.946C6.85372 17.1007 7.29058 16.9145 7.4452 16.5302L8.87496 12.9769C9.17588 12.2291 10.1926 12.1264 10.637 12.799L11.2347 13.7036C11.2575 13.7381 11.2713 13.7776 11.2751 13.8188L11.5023 16.3181C11.5398 16.7306 11.9046 17.0346 12.3171 16.9971C12.7296 16.9596 13.0336 16.5948 12.9961 16.1823L12.7689 13.683C12.7427 13.395 12.6456 13.118 12.4862 12.8767L11.5618 11.4776C11.3853 11.2105 11.3474 10.875 11.4598 10.5752L11.8384 9.56557C11.8651 9.49439 11.9105 9.43174 11.9699 9.38425C12.1631 9.22972 12.4471 9.27383 12.5844 9.47967L12.8754 9.91617C12.9258 9.99177 12.9895 10.0576 13.0635 10.1104L14.8135 11.3605C15.1505 11.6013 15.6189 11.5233 15.8597 11.1862C16.1005 10.8492 16.0224 10.3808 15.6854 10.14L14.1963 9.07624C14.0977 9.00582 14.0128 8.91807 13.9456 8.81727L13.1234 7.5842C13.0199 7.42897 12.8623 7.31789 12.6813 7.27264L9.68132 6.52264C9.56189 6.49278 9.43694 6.49278 9.31751 6.52264Z" fill="currentColor"/></svg>
        </button>
      </div>

      <div id="settings-panel" class="hidden">
        <div class="settings-header">AI Settings</div>
        <div class="settings-row">
          <label>Provider</label>
          <select id="provider-select">
            <option value="openai">OpenAI</option>
            <option value="groq">Groq</option>
            <option value="openrouter">OpenRouter</option>
            <option value="anthropic">Claude</option>
            <option value="gemini">Gemini</option>
            <option value="deepseek">DeepSeek</option>
            <option value="mistral">Mistral</option>
            <option value="together">Together AI</option>
            <option value="perplexity">Perplexity</option>
            <option value="xai">xAI (Grok)</option>
            <option value="github">GitHub Models</option>
            <option value="custom">Custom</option>
          </select>
        </div>
        <div class="settings-row" id="custom-url-row" style="display:none">
          <label>Base URL</label>
          <input type="text" id="custom-url-input" placeholder="https://api.example.com/v1" />
        </div>
        <div class="settings-row">
          <label>API Key</label>
          <input type="password" id="api-key-input" placeholder="sk-..." />
        </div>
        <div class="settings-row">
          <button id="verify-key-btn">Verify & Save</button>
          <span id="key-status"></span>
        </div>
        <div class="settings-row" id="model-row" style="display:none">
          <label>Model</label>
          <select id="model-select"></select>
          <input type="text" id="model-input" style="display:none;margin-top:3px" placeholder="Enter model name" />
        </div>
        <div class="settings-row settings-actions">
          <button id="settings-close-btn">Close</button>
        </div>
      </div>

      <div id="ask-input-container" class="hidden">
        <input type="text" id="ask-input" placeholder="Ask me anything..." />
        <button id="ask-send-btn">Send</button>
      </div>

      <div id="message-window">
        <div id="message-content"></div>
      </div>

      <div id="float-text-container"></div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
